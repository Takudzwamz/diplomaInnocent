name: Build and Deploy Container to Azure Web App via Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build . -f StorefrontRazor/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/skinet-storefront:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/skinet-storefront:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skinet-storefront --all-tags

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App for Containers
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'sputnikdevsstorefront'
          images: '${{ secrets.DOCKERHUB_USERNAME }}/skinet-storefront:latest'